<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bill Splitter - Cloud</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React Framework -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FIREBASE (Stable Version 8) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <!-- HTML2CANVAS -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <style>
        :root {
            --primary: #1d4ed8;
            --primary-dark: #1e3a8a;
            --primary-light: #dbeafe;
            --surface: #ffffff;
            --bg: #f0f4ff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-muted: #64748b;
            --success: #059669;
            --warning: #d97706;
            --danger: #dc2626;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(29,78,216,0.08);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(147,197,253,0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(196,181,253,0.15) 0%, transparent 50%);
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* Tabs */
        .tab-active { 
            color: var(--primary); 
            font-weight: 700;
            position: relative;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), #60a5fa);
            border-radius: 3px 3px 0 0;
        }
        .tab-inactive { color: var(--text-muted); font-weight: 500; }

        /* Cards */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        /* History */
        .history-card { transition: all 0.2s ease; }
        .history-expanded { 
            border-color: #93c5fd !important; 
            background: linear-gradient(135deg, #f0f9ff, #eff6ff) !important;
            box-shadow: 0 4px 20px rgba(59,130,246,0.15) !important;
        }

        /* Buttons */
        .status-btn { transition: all 0.2s; }
        .status-btn:active { transform: scale(0.88); }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.05rem;
            padding: 14px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(37,99,235,0.35);
            letter-spacing: 0.03em;
        }
        .btn-primary:active { transform: scale(0.97); box-shadow: 0 2px 8px rgba(37,99,235,0.2); }

        /* Select */
        .select-wrapper { position: relative; }
        .select-wrapper::after { 
            content: '▾'; 
            font-size: 0.75rem; 
            position: absolute; 
            right: 10px; top: 50%; 
            transform: translateY(-50%); 
            pointer-events: none; 
            color: var(--text-muted); 
        }

        /* Modal */
        .modal-overlay { 
            background: rgba(15,23,42,0.6); 
            backdrop-filter: blur(4px);
            position: fixed; 
            inset: 0; 
            z-index: 50; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 16px;
        }

        /* Member type colors */
        .type-family { border-left: 3px solid #3b82f6; }
        .type-house { border-left: 3px solid #8b5cf6; }
        .type-shop { border-left: 3px solid #f59e0b; }
        .type-vacant { border-left: 3px solid #94a3b8; opacity: 0.65; }

        /* Input style */
        .input-field {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }
        .input-field:focus { border-color: #93c5fd; }

        /* Section headers */
        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }
        .section-label .step-num {
            background: var(--primary);
            color: white;
            width: 20px; height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 800;
            flex-shrink: 0;
        }

        /* Sync pulse */
        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .syncing { animation: pulse-green 1.2s ease infinite; }

        /* Receipt */
        #receipt-capture { 
            position: absolute; left: -9999px; top: 0;
            width: 480px;
            background: #ffffff; 
            padding: 32px;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
            color: #1e293b;
        }
        .receipt-header { text-align: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 16px; margin-bottom: 16px; }
        .receipt-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 1px dashed #cbd5e1; }
        .unit-badge { background: #f1f5f9; padding: 2px 8px; border-radius: 6px; border: 1px solid #cbd5e1; font-weight: 700; font-size: 0.85rem; margin-right: 10px; display: inline-block; color: #475569; }

        /* Fade in */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeSlideUp 0.3s ease forwards; }

        /* Amount big */
        .amount-display {
            font-size: 2.25rem;
            font-weight: 800;
            line-height: 1;
        }

        /* Cloud badge */
        .cloud-active-badge {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.4);
            color: #059669;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons ---
        const Icons = {
            Calc: () => <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16" y1="14" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></svg>,
            Reset: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>,
            Trash: () => <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>,
            Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
            Copy: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
            Image: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>,
            Settings: () => <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Save: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>,
            Download: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>,
            History: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>,
            Send: () => <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>,
            ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
            ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"/></svg>,
            Cloud: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>,
            CloudOff: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="2" y1="2" x2="22" y2="22"/><path d="M5.034 5.034A2 2 0 0 0 5 6v11a2 2 0 0 0 2 2h12a2 2 0 0 0 1.926-.854"/><path d="M19 11V6a2 2 0 0 0-2-2H9.83"/></svg>,
            Chart: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>,
            List: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
            Nuke: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
        };

        const DEFAULT_MEMBERS = [
            { id: 1, unit: '101', name: 'B. Shivakumar', type: 'house', count: 1 },
            { id: 2, unit: '102', name: 'Ajay Kumar', type: 'family', count: 7 },
            { id: 3, unit: '103', name: 'Afjal Hussain', type: 'family', count: 5 },
            { id: 4, unit: 'G-1', name: 'Yasmin', type: 'family', count: 4 },
            { id: 5, unit: 'G-2', name: 'Kedar Dena', type: 'family', count: 4 },
            { id: 6, unit: 'S-1', name: 'Shop 1', type: 'shop', count: 1 },
        ];

        const sortMembersList = (list) => {
            return [...list].sort((a, b) => {
                const u1 = (a.unit || '').toString().toLowerCase().trim();
                const u2 = (b.unit || '').toString().toLowerCase().trim();
                const getRank = (str) => {
                    if (str.startsWith('g')) return 1;
                    if (/^\d/.test(str)) return 2;
                    if (str.startsWith('s') || str.includes('shop')) return 3;
                    return 4;
                };
                const r1 = getRank(u1), r2 = getRank(u2);
                if (r1 !== r2) return r1 - r2;
                return u1.localeCompare(u2, undefined, { numeric: true, sensitivity: 'base' });
            });
        };

        const TYPE_COLORS = { family: '#3b82f6', house: '#8b5cf6', shop: '#f59e0b', vacant: '#94a3b8' };
        const TYPE_LABELS = { family: 'Family', house: 'Fixed House', shop: 'Fixed Shop', vacant: 'Vacant' };

        function App() {
            const [activeTab, setActiveTab] = useState('calc'); 
            const [historyView, setHistoryView] = useState('list');
            const [waterBill, setWaterBill] = useState('');
            const [motorBill, setMotorBill] = useState('');
            const [tankerBill, setTankerBill] = useState('');
            const [billMonth, setBillMonth] = useState(new Date().toISOString().slice(0, 7)); 
            const [statsYear, setStatsYear] = useState(new Date().getFullYear().toString()); 
            
            const [members, setMembers] = useState(DEFAULT_MEMBERS);
            const [houseRate, setHouseRate] = useState(500);
            const [shopRate, setShopRate] = useState(200);
            const [result, setResult] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [history, setHistory] = useState([]);
            const [expandedHistory, setExpandedHistory] = useState(null);
            
            const [paymentModal, setPaymentModal] = useState({ show: false, historyIdx: null, memberIdx: null, currentPaid: 0, total: 0, name: '' });
            const [showCloudSetup, setShowCloudSetup] = useState(false);
            const [cloudConfig, setCloudConfig] = useState({ apiKey: '', projectId: '' });
            const [isCloudActive, setIsCloudActive] = useState(false);
            const [syncStatus, setSyncStatus] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const ignoreRemoteUpdate = useRef(false);

            // 1. Initial Load
            useEffect(() => {
                const loadSafe = (key) => { try { return JSON.parse(localStorage.getItem(key)) } catch (e) { return null; }};
                const savedData = loadSafe('billSplitterData_v21'); 
                const savedCloud = loadSafe('billSplitterCloudConfig');
                
                if (savedData) {
                    // Load members/rates from localStorage (will be overridden by cloud if active)
                    if(savedData.members) setMembers(savedData.members);
                    if(savedData.houseRate) setHouseRate(savedData.houseRate);
                    if(savedData.shopRate) setShopRate(savedData.shopRate);
                    // ✅ FIX: Do NOT restore billMonth - always default to current month
                    // if(savedData.waterBill) setWaterBill(savedData.waterBill);  // Don't restore old bills
                    // if(savedData.motorBill) setMotorBill(savedData.motorBill);
                    // if(savedData.tankerBill) setTankerBill(savedData.tankerBill);
                }
                
                if (savedCloud) {
                    setCloudConfig(savedCloud);
                    if(savedCloud.apiKey && savedCloud.projectId) initializeFirebase(savedCloud);
                } else {
                    const savedHistory = loadSafe('billSplitterHistory');
                    if(savedHistory) setHistory(savedHistory);
                }
            }, []);

            // 2. Data Persistence
            useEffect(() => {
                const dataToSave = { members, houseRate, shopRate, waterBill, motorBill, tankerBill, billMonth };
                localStorage.setItem('billSplitterData_v21', JSON.stringify(dataToSave));
                localStorage.setItem('billSplitterHistory', JSON.stringify(history));

                if (isCloudActive && window.firebaseApp && !ignoreRemoteUpdate.current) {
                    const saveDataToCloud = async () => {
                        setSyncStatus('syncing');
                        try {
                            const db = firebase.firestore();
                            await db.collection("bills").doc("current_data").set(dataToSave);
                            setSyncStatus('synced');
                            setTimeout(() => setSyncStatus(''), 2500);
                        } catch (e) {
                            setSyncStatus('failed');
                        }
                    };
                    const timeout = setTimeout(saveDataToCloud, 2000); 
                    return () => clearTimeout(timeout);
                }
            }, [members, houseRate, shopRate, waterBill, motorBill, tankerBill, billMonth, history]); 

            const initializeFirebase = (config) => {
                if (!window.firebaseApp) {
                    try {
                        if (typeof firebase === 'undefined') { alert("Cloud module loading... Check internet."); return; }
                        if (!firebase.apps.length) window.firebaseApp = firebase.initializeApp(config);
                        else window.firebaseApp = firebase.app();

                        const db = firebase.firestore();
                        setIsCloudActive(true);
                        setIsLoading(true);
                        
                        // ✅ BUG FIX: Actually load member names & rates from cloud
                        db.collection("bills").doc("current_data").onSnapshot((doc) => {
                            if (ignoreRemoteUpdate.current) return;
                            if (doc.exists) {
                                const data = doc.data();
                                if (data.members && data.members.length > 0) setMembers(data.members);
                                if (data.houseRate !== undefined) setHouseRate(data.houseRate);
                                if (data.shopRate !== undefined) setShopRate(data.shopRate);
                                // NOTE: We intentionally skip restoring billMonth, waterBill, motorBill, tankerBill
                                // so each session starts fresh with current month
                            }
                        });
                        
                        db.collection("bills").doc("history").onSnapshot((doc) => { 
                            setIsLoading(false);
                            if (ignoreRemoteUpdate.current) return;
                            if(doc.exists) {
                                const data = doc.data();
                                if(data.records) setHistory(data.records); 
                            } else {
                                setHistory([]);
                            }
                        }, (error) => {
                            setIsLoading(false);
                            console.error("Cloud Read Error:", error);
                            alert("Error reading from Cloud. Check API Key permissions.");
                        });
                    } catch (e) {
                        alert("Error connecting to Cloud. Check keys.");
                        setIsCloudActive(false);
                        setIsLoading(false);
                    }
                } else {
                    setIsCloudActive(true);
                }
            };

            const copyImage = () => {
                const captureDiv = document.getElementById('receipt-capture');
                captureDiv.style.left = "0";
                html2canvas(captureDiv, { scale: 2, backgroundColor: "#ffffff", useCORS: true }).then(canvas => {
                    captureDiv.style.left = "-9999px";
                    canvas.toBlob(blob => {
                        try {
                            const item = new ClipboardItem({ 'image/png': blob });
                            navigator.clipboard.write([item]).then(() => {
                                alert('Receipt image copied!');
                            });
                        } catch (e) {
                            alert("Your browser doesn't support Image Copy. Please use 'Save Image'.");
                        }
                    });
                });
            };

            const downloadImage = () => {
                const captureDiv = document.getElementById('receipt-capture');
                captureDiv.style.left = "0";
                html2canvas(captureDiv, { scale: 2 }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Bill-${result.billMonthName}.jpg`;
                    link.href = canvas.toDataURL('image/jpeg', 0.9);
                    link.click();
                    captureDiv.style.left = "-9999px";
                });
            };

            const openWhatsApp = (text) => {
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                const encoded = encodeURIComponent(text);
                if (isMobile) window.location.href = `whatsapp://send?text=${encoded}`;
                else window.open(`https://web.whatsapp.com/send?text=${encoded}`, '_blank');
            };

            const handleCloudSubmit = () => {
                localStorage.setItem('billSplitterCloudConfig', JSON.stringify(cloudConfig));
                initializeFirebase(cloudConfig);
                setShowCloudSetup(false);
            };

            const handleAddMember = () => setMembers([...members, { id: Date.now(), unit: '', name: '', type: 'family', count: 1 }]);
            const handleRemoveMember = (id) => setMembers(members.filter(m => m.id !== id));
            const handleUpdateMember = (id, field, value) => setMembers(members.map(m => m.id === id ? { ...m, [field]: value } : m));

            const calculate = () => {
                const water = parseFloat(waterBill) || 0;
                const motor = parseFloat(motorBill) || 0;
                const tanker = parseFloat(tankerBill) || 0;
                const totalBill = water + motor + tanker;
                let fixedCollection = 0, totalVariableMembers = 0;
                const hRate = parseFloat(houseRate) || 0;
                const sRate = parseFloat(shopRate) || 0;

                const sortedMembers = sortMembersList(members);
                setMembers(sortedMembers);

                sortedMembers.forEach(m => {
                    if (m.type === 'house') fixedCollection += hRate;
                    else if (m.type === 'shop') fixedCollection += sRate;
                    else if (m.type !== 'vacant') totalVariableMembers += parseInt(m.count) || 0;
                });

                let finalHRate = hRate, finalSRate = sRate, perPerson = 0, remaining = 0;
                if (totalBill <= fixedCollection) {
                    const scale = fixedCollection > 0 ? totalBill / fixedCollection : 0;
                    finalHRate = hRate * scale; finalSRate = sRate * scale;
                } else {
                    remaining = totalBill - fixedCollection;
                    perPerson = totalVariableMembers > 0 ? remaining / totalVariableMembers : 0;
                }

                let calculatedTotal = 0;
                const breakdown = sortedMembers.map(m => {
                    let amount = 0, detail = '';
                    if (m.type === 'house') { amount = Math.round(finalHRate); detail = 'Fixed House'; }
                    else if (m.type === 'shop') { amount = Math.round(finalSRate); detail = 'Fixed Shop'; }
                    else if (m.type === 'vacant') { amount = 0; detail = 'Vacant'; }
                    else { amount = Math.round((parseInt(m.count) || 0) * perPerson); detail = `${m.count} members × ₹${perPerson.toFixed(2)}`; }
                    calculatedTotal += amount;
                    return { ...m, amount, detail, paidAmount: 0 };
                }).filter(m => m.type !== 'vacant');

                const difference = totalBill - calculatedTotal; 
                if (difference !== 0 && totalVariableMembers > 0) {
                    const firstFamilyIndex = breakdown.findIndex(m => m.type === 'family' && m.amount > 0);
                    if (firstFamilyIndex !== -1) breakdown[firstFamilyIndex].amount += difference;
                }

                const [year, month] = billMonth.split('-');
                const monthName = new Date(year, month - 1).toLocaleString('default', { month: 'long', year: 'numeric' });
                setResult({ totalBill, perPerson, breakdown, water, motor, tanker, date: new Date().toLocaleString(), billMonthName: monthName, billMonthKey: billMonth });
            };

            const updateCloudHistory = async (newHistory) => {
                ignoreRemoteUpdate.current = true;
                setHistory(newHistory); 
                if (isCloudActive && window.firebaseApp) {

                        const db = firebase.firestore();
                        await db.collection("bills").doc("history").set({ records: newHistory });
                    } catch (e) { alert("Failed to update Cloud! Check internet."); }
                }
                setTimeout(() => { ignoreRemoteUpdate.current = false; }, 2000);
            };

            const saveToHistory = () => { if(!result) return; updateCloudHistory([result, ...history]); alert("Saved to History!"); };
            
            const openPaymentModal = (hIdx, mIdx, item, e) => {

                    const status = b.paidAmount >= b.amount ? 'PAID' : (b.paidAmount > 0 ? 'PARTIAL' : 'PENDING');
                    csv += `${r.billMonthName || r.date},${r.date.replace(',','')},${r.totalBill},${r.water},${r.motor},${r.tanker},${r.perPerson.toFixed(2)},${b.unit||''},${b.name||''},${Math.round(b.amount)},${b.paidAmount},${status}\n`;
                }));
                const link = document.createElement("a"); link.href = encodeURI("data:text/csv;charset=utf-8,"+csv); link.download = "history.csv"; link.click();
            };

                                                <div style={{ fontSize: '0.72rem', color: '#94a3b8', marginTop: '2px' }}>{item.detail}</div>
                                            </div>
                                            <div style={{ fontWeight: '800', fontSize: '1.1rem', color: '#1e293b' }}>₹{Math.round(item.amount)}</div>
                                        </div>
                                    ))}
                                </div>
                                <div style={{ marginTop: '24px', paddingTop: '12px', borderTop: '1px solid #f1f5f9', textAlign: 'center', fontSize: '0.72rem', color: '#cbd5e1' }}>
                                    Bill Splitter by Babu Mani (@ChartWizMani)
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
